# UAPI — second example account (another host or customer)
# Install: cpanel-mcp-ctx add client-uapi --from this-file.yaml
#
# Before use:
#   export CLIENT_UAPI_TOKEN='your-uapi-token'
#
default_server: client-uapi

servers:
  client-uapi:
    type: uapi
    host: cpanel-client.example.com
    port: 2083
    auth:
      method: token
      username: clientacct
      token_env: CLIENT_UAPI_TOKEN
    spec_version: auto
    verify_tls: true
    timeout_seconds: 60
    # Optional: block destructive ops while keeping mail/files/DB access
    # denied_operations:
    #   - Passwd/change_password
